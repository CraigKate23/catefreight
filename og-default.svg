<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1f31"/>
      <stop offset="55%" stop-color="#163b56"/>
      <stop offset="100%" stop-color="#206189"/>
    </linearGradient>
    <radialGradient id="glow" cx="20%" cy="30%" r="55%">
      <stop offset="0%" stop-color="#1ea889" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#1ea889" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="85%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#206189" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#206189" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- container silhouette -->
  <g opacity="0.10" stroke="#7ce5cb" stroke-width="3" fill="none">
    <rect x="700" y="190" width="380" height="200" rx="6"/>
    <line x1="730" y1="190" x2="730" y2="390"/>
    <line x1="780" y1="190" x2="780" y2="390"/>
    <line x1="830" y1="190" x2="830" y2="390"/>
    <line x1="880" y1="190" x2="880" y2="390"/>
    <line x1="930" y1="190" x2="930" y2="390"/>
    <line x1="980" y1="190" x2="980" y2="390"/>
    <line x1="1030" y1="190" x2="1030" y2="390"/>
  </g>

  <!-- accent pill -->
  <g transform="translate(80, 110)">
    <rect width="220" height="38" rx="19" fill="rgba(30,168,137,0.18)" stroke="rgba(30,168,137,0.32)"/>
    <text x="20" y="24" font-family="Inter, sans-serif" font-weight="700" font-size="14"
          fill="#7ce5cb" letter-spacing="2.5">CHARLESTON, SC</text>
  </g>

  <!-- headline -->
  <text x="80" y="240" font-family="Inter, sans-serif" font-weight="800" font-size="72"
        fill="#ffffff" letter-spacing="-1.5">Cate Freight</text>
  <text x="80" y="320" font-family="Inter, sans-serif" font-weight="800" font-size="44"
        fill="#7ce5cb" letter-spacing="-0.5">Charleston container drayage.</text>
  <text x="80" y="370" font-family="Inter, sans-serif" font-weight="600" font-size="28"
        fill="rgba(255,255,255,0.8)">Containers in. Containers out.</text>

  <!-- bullets -->
  <g font-family="Inter, sans-serif" font-size="20" fill="rgba(255,255,255,0.78)">
    <text x="80" y="450">▸  All three SCPA terminals</text>
    <text x="80" y="486">▸  Releases checked before dispatch</text>
    <text x="80" y="522">▸  Quote inside the hour</text>
  </g>

  <!-- url -->
  <text x="80" y="582" font-family="Inter, sans-serif" font-weight="700" font-size="22"
        fill="#ffffff">catefreight.com</text>

  <!-- decorative wave bottom -->
  <path d="M0,610 Q150,580 300,605 T600,610 T900,608 T1200,612 L1200,630 L0,630 Z"
        fill="#1ea889" opacity="0.7"/>
</svg>
